<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Model Details</title>

  <!-- DARK THEME CSS -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<header class="site-header">
  <h1 id="modelName"></h1>
  <h3 id="brandName" style="margin-top:4px; color:var(--accent-gold);"></h3>
</header>

<div class="page-container">

  <!-- HERO IMAGE -->
  <div style="text-align:center; margin-top:20px;">
    <img id="heroImage" style="width:100%; max-height:420px; object-fit:cover; border-radius:10px; box-shadow:0 4px 16px rgba(0,0,0,0.5);" />
  </div>

  <!-- OVERVIEW -->
  <div class="brand-section-box" style="margin-top:30px;">
    <h2 class="section-title">Overview</h2>
    <p id="modelSummary" style="line-height:1.6; color:var(--text-light);"></p>
  </div>

  <!-- SPECS -->
  <div class="brand-section-box">
    <h2 class="section-title">Specifications</h2>
    <ul id="specList" style="line-height:1.8; color:var(--text-light);"></ul>
  </div>

  <!-- FUN FACTS -->
  <div class="brand-section-box">
    <h2 class="section-title">Fun Facts</h2>
    <ul id="funFacts" style="line-height:1.8; color:var(--text-light);"></ul>
  </div>

  <!-- ACHIEVEMENTS -->
  <div class="brand-section-box">
    <h2 class="section-title">Notable Achievements</h2>
    <ul id="achievements" style="line-height:1.8; color:var(--text-light);"></ul>
  </div>

  <!-- VARIANTS -->
  <div class="brand-section-box">
    <h2 class="section-title">Variants</h2>
    <ul id="variants" style="line-height:1.8; color:var(--text-light);"></ul>
  </div>

  <!-- GALLERY -->
  <div class="brand-section-box">
    <h2 class="section-title">Gallery</h2>
    <div id="gallery" class="brand-grid"></div>
  </div>

</div>

<!-- MUST LOAD IN THIS ORDER -->
<script src="data/cars.js"></script>
<script>
  const urlParams = new URLSearchParams(window.location.search);
  const brandSlug = urlParams.get("brand");
  const modelSlug = urlParams.get("model");

  const modelData = britishCars.find(
    car => car.slug === brandSlug && car.model_slug === modelSlug
  );

  if (!modelData) {
    document.body.innerHTML = "<h2 style='text-align:center; color:white;'>Model not found.</h2>";
  }

  const brandName = modelData.manufacturer;
  const themeColor = brandThemes[brandSlug];

  document.documentElement.style.setProperty("--brand-color", themeColor);

  document.getElementById("modelName").textContent = modelData.model;
  document.getElementById("brandName").textContent = brandName;
  document.getElementById("heroImage").src = modelData.hero_image;
  document.getElementById("modelSummary").textContent = modelData.model_summary;

  const specList = document.getElementById("specList");
  const specs = [
    ["Years Produced", modelData.years_produced],
    ["Engine", modelData.engine],
    ["Horsepower", modelData.horsepower + " hp"],
    ["Top Speed", modelData.top_speed_mph + " mph"],
    ["Body Style", modelData.body_style],
    ["Drivetrain", modelData.drivetrain],
    ["Transmission", modelData.transmission],
    ["Seating", modelData.seating],
    ["Production Location", modelData.production_location],
    ["Designer", modelData.designer],
    ["Price When New", modelData.price_when_new],
    ["Current Value Range", modelData.current_value_range],
    ["Model Type", modelData.model_type]
  ];

  specs.forEach(([label, value]) => {
    const li = document.createElement("li");
    li.textContent = `${label}: ${value}`;
    specList.appendChild(li);
  });

  const funFacts = document.getElementById("funFacts");
  modelData.fun_facts.forEach(f => {
    const li = document.createElement("li");
    li.textContent = f;
    funFacts.appendChild(li);
  });

  const achievements = document.getElementById("achievements");
  modelData.notable_achievements.forEach(a => {
    const li = document.createElement("li");
    li.textContent = a;
    achievements.appendChild(li);
  });

  const variants = document.getElementById("variants");
  modelData.variants.forEach(v => {
    const li = document.createElement("li");
    li.textContent = `${v.name} (${v.years}) — ${v.engine}`;
    variants.appendChild(li);
  });

  const gallery = document.getElementById("gallery");
  modelData.image_gallery.forEach(img => {
    const image = document.createElement("img");
    image.src = img;
    image.style.width = "100%";
    image.style.borderRadius = "8px";
    image.style.boxShadow = "0 2px 10px rgba(0,0,0,0.5)";
    gallery.appendChild(image);
  });
</script>

</body>
</html>
