<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Car Details</title>

  <!-- Styles -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Back Button -->
  <button class="back-btn" onclick="history.back()">← Back</button>

  <!-- Hero Image -->
  <div class="hero-image">
    <img id="heroImage" src="" alt="Car Hero Image">
  </div>

  <!-- Car Title -->
  <header class="details-header">
    <h1 id="car-title"></h1>
    <p id="car-subtitle"></p>
  </header>

  <!-- Image Gallery -->
  <div id="imageGallery" class="image-gallery"></div>

  <!-- Car Specs -->
  <section class="car-specs">
    <div class="details-card">
      <h2>Specifications</h2>
      <p><strong>Engine:</strong> <span id="spec-engine"></span></p>
      <p><strong>Engine Capacity:</strong> <span id="spec-capacity"></span> L</p>
      <p><strong>Years Produced:</strong> <span id="spec-years"></span></p>
      <p><strong>Body Style:</strong> <span id="spec-body"></span></p>
      <p><strong>Drivetrain:</strong> <span id="spec-drive"></span></p>
      <p><strong>Transmission:</strong> <span id="spec-trans"></span></p>
      <p><strong>Seating:</strong> <span id="spec-seat"></span></p>
    </div>

    <div class="details-card">
      <h2>Notable Details</h2>
      <ul id="notable-list"></ul>
    </div>

    <div class="details-card">
      <h2>Tags</h2>
      <div id="tag-list"></div>
    </div>
  </section>

  <!-- Lightbox Viewer -->
  <div id="lightbox" class="lightbox-overlay">
    <span id="lightbox-close" class="lightbox-close">×</span>
    <span id="lightbox-prev" class="lightbox-arrow left">‹</span>
    <img id="lightbox-img" class="lightbox-image" src="">
    <span id="lightbox-next" class="lightbox-arrow right">›</span>
  </div>

  <!-- Scripts -->
  <script src="data/cars.js"></script>
  <script src="script.js"></script>
  <script>
    // Initialize details page
    loadCarDetails();
  </script>

</body>
</html>
