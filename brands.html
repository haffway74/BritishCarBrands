<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>British Car Brands</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Page Title -->
  <h1 class="brands-page-title">British Car Brands</h1>

  <!-- Search + Filter -->
  <section class="brand-search-section">
    <input type="text" id="brandSearchInput" placeholder="Search brands...">
    <select id="brandCategoryFilter">
      <option value="all">All Categories</option>
      <option value="sports">Sports</option>
      <option value="luxury">Luxury</option>
      <option value="classic">Classic</option>
      <option value="modern">Modern</option>
    </select>
  </section>

  <!-- Modern Brands Box -->
  <section class="brand-group">
    <div id="modern-brands" class="brand-grid"></div>
  </section>

  <!-- Classic Brands Box -->
  <section class="brand-group">
    <div id="classic-brands" class="brand-grid"></div>
  </section>

  <!-- Scripts -->
  <script src="data/cars.js"></script>
  <script src="script.js"></script>

</body>
</html>
